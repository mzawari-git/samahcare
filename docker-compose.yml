version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: سماح كير -app
    restart: unless-stopped
    volumes:
      - ./storage:/var/www/storage
    networks:
      - سماح كير -network
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=production
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=سماح كير 
      - DB_USERNAME=سماح كير 
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis

  nginx:
    image: nginx:alpine
    container_name: سماح كير -nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - سماح كير -network
    depends_on:
      - app

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: سماح كير -queue
    restart: unless-stopped
    command: php artisan horizon
    volumes:
      - ./storage:/var/www/storage
    networks:
      - سماح كير -network
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=production
      - QUEUE_CONNECTION=redis
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_DATABASE=سماح كير 
      - DB_USERNAME=سماح كير 
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: سماح كير -scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - ./storage:/var/www/storage
    networks:
      - سماح كير -network
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=production
      - QUEUE_CONNECTION=redis
      - DB_CONNECTION=pgsql
      - DB_DATABASE=سماح كير 
      - DB_USERNAME=سماح كير 
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: سماح كير -ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - سماح كير -network

  redis:
    image: redis:7-alpine
    container_name: سماح كير -redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - سماح كير -network

  db:
    image: postgres:16-alpine
    container_name: سماح كير -db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=سماح كير 
      - POSTGRES_USER=سماح كير 
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - سماح كير -network

volumes:
  postgres_data:

networks:
  سماح كير -network:
    driver: bridge
